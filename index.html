<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM Trading House — Quotation System</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#222;font-size:14px}
.header{background:#1a2744;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:14px}
.header h1{font-size:18px;font-weight:600}
.header p{font-size:11px;opacity:.7;margin-top:2px}
.logo{width:44px;height:44px;background:#c8a951;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#1a2744;flex-shrink:0}
.container{max-width:960px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:10px;padding:16px 18px;margin-bottom:14px;border:1px solid #e0e4ea}
.card-title{font-size:13px;font-weight:600;color:#1a2744;text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.card-title::before{content:'';width:3px;height:14px;background:#c8a951;border-radius:2px;display:inline-block}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid.full{grid-template-columns:1fr}
.form-group label{display:block;font-size:12px;color:#666;margin-bottom:3px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 10px;border:1px solid #d0d5dd;border-radius:6px;font-size:13px;color:#222;background:#fff;outline:none;transition:border .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#1a2744}
.form-group textarea{min-height:56px;resize:vertical}
.cat-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.cat-tab{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid #d0d5dd;cursor:pointer;background:#fff;color:#555;transition:all .15s;white-space:nowrap}
.cat-tab:hover{border-color:#1a2744;color:#1a2744}
.cat-tab.active{background:#1a2744;color:#fff;border-color:#1a2744}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;max-height:380px;overflow-y:auto;padding-right:4px}
.prod-card{border:1px solid #e0e4ea;border-radius:8px;padding:8px;cursor:pointer;transition:all .15s;background:#fff;display:flex;flex-direction:column;align-items:center;text-align:center}
.prod-card:hover{border-color:#c8a951;background:#fffdf5}
.prod-card.selected{border-color:#1a2744;border-width:2px;background:#f0f3fa}
.prod-img{width:80px;height:80px;object-fit:contain;border-radius:6px;margin-bottom:6px;background:#f8f8f8;}
.prod-code{font-size:11px;font-weight:700;color:#c8a951;margin-bottom:2px}
.prod-name{font-size:12px;font-weight:500;color:#1a2744;margin-bottom:2px;line-height:1.4;text-align:center}
.prod-meta{font-size:11px;color:#888}
.prod-inputs{margin-top:8px;display:grid;grid-template-columns:1fr;gap:6px;width:100%}
.prod-inputs label{font-size:11px;color:#666;display:block;margin-bottom:2px}
.prod-inputs input{width:100%;padding:4px 7px;border:1px solid #d0d5dd;border-radius:5px;font-size:12px}
.quote-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#1a2744;color:#fff;padding:8px 10px;text-align:left;font-weight:500;font-size:12px}
td{padding:8px 10px;border-bottom:1px solid #f0f2f5;color:#333;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
.remove-btn{background:none;border:none;color:#bbb;cursor:pointer;font-size:18px;line-height:1;padding:0 4px}
.remove-btn:hover{color:#e53935}
.total-row{display:flex;justify-content:flex-end;align-items:baseline;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid #e0e4ea}
.total-label{font-size:13px;color:#666}
.total-amount{font-size:22px;font-weight:700;color:#1a2744}
.empty-msg{text-align:center;color:#aaa;padding:24px;font-size:13px}
.btn-submit{width:100%;padding:12px;background:#1a2744;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:.02em;transition:background .15s}
.btn-submit:hover{background:#253660}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.status{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:10px;display:none}
.status.success{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;display:block}
.status.error{background:#ffebee;color:#c62828;border:1px solid #ef9a9a;display:block}
.quote-no-badge{display:inline-block;background:#fff8e6;border:1px solid #c8a951;color:#7a5c00;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600;margin-left:auto}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}.prod-grid{grid-template-columns:1fr 1fr}}
.suggest-item{padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #f0f2f5;display:flex;justify-content:space-between;align-items:center}
.suggest-item:last-child{border-bottom:none}
.suggest-item:hover{background:#fffdf5}
.suggest-name{font-weight:600;color:#1a2744}
.suggest-email{font-size:11px;color:#888}
</style>
</head>

function genQNo(){
  let num = parseInt(localStorage.getItem('dm_qno_counter')||'0') + 1;
  localStorage.setItem('dm_qno_counter', num);
  return 'QT-DM' + String(num).padStart(5,'0');

function selectCat(cat){

}

function renderProducts(){
  document.getElementById('prod-grid').innerHTML = PRODUCTS.filter(p=>p.cat===activeCat).map(p=>{
    const sel=cart[p.code];
    const imgSrc=PRODUCT_IMAGES[p.code]||'';

      </div>`:''}
    </div>`;
  }).join('');

function getDefaultUnit(code){
  const p=PRODUCTS.find(x=>x.code===code);
  const pairCats=["Cotton Gloves","Dotted Gloves","Nylon Gloves","Rubber/Latex Coated","Nitrile & PVC","Cut Resistant","Rubber & Household","Disposable Gloves","Leather & Welding"];
  const pairKeywords=["Glove","Boot","Shoe"];
  if(pairCats.includes(p.cat)) return 'PAIR';
  if(pairKeywords.some(k=>p.name.includes(k))) return 'PAIR';
  return 'EACH';
}

function toggleProduct(code){
  if(cart[code]){delete cart[code];}
  else{cart[code]={price:null,unit:getDefaultUnit(code)};}
  renderProducts();renderQuote();
}

function updatePrice(code,val){if(cart[code])cart[code].price=val===''?null:parseFloat(val)||0;renderQuote();}
function updateUnit(code,val){if(cart[code])cart[code].unit=val;renderQuote();}
function removeItem(code){delete cart[code];renderProducts();renderQuote();}

let customItems = {};
let customCounter = 1;

function addCustomItem(){
  const name = document.getElementById('custom-name').value.trim();
  const price = document.getElementById('custom-price').value;
  const unit = document.getElementById('custom-unit').value;
  const color = document.getElementById('custom-color').value.trim();
  const size = document.getElementById('custom-size').value.trim();
  if(!name){alert('Please enter an item name.');return;}
  const code = 'CUSTOM' + String(customCounter).padStart(3,'0');
  customCounter++;
  const pairWords = ['glove','boot','shoe','gauntlet','mitten'];
  const autoPair = pairWords.some(w => name.toLowerCase().includes(w));
  customItems[code] = {
    name: name,
    price: price ? parseFloat(price) : null,
    unit: autoPair ? 'PAIR' : unit,
    color: color || '—',
    size: size || '—'
  };
  document.getElementById('custom-name').value = '';
  document.getElementById('custom-price').value = '';
  document.getElementById('custom-unit').value = 'EACH';
  document.getElementById('custom-color').value = '';
  document.getElementById('custom-size').value = '';
  renderQuote();
}

function removeCustomItem(code){delete customItems[code];renderQuote();}
function updateCustomPrice(code,val){if(customItems[code])customItems[code].price=val===''?null:parseFloat(val)||0;renderQuote();}

function renderQuote(){
  const productCodes = Object.keys(cart);
  const customCodes = Object.keys(customItems);
  if(!productCodes.length && !customCodes.length){
    document.getElementById('quote-body').innerHTML='<div class="empty-msg">Click on product cards or add a custom item above</div>';
    return;
  }

  // Only include items WITH price in summary
  const productRows = productCodes
    .filter(code => cart[code].price !== null && cart[code].price !== undefined)
    .map(code=>{
      const p = PRODUCTS.find(x=>x.code===code);
      const item = cart[code];
      return `<tr>
        <td style="font-size:11px;font-weight:700;color:#c8a951">${p.code}</td>
        <td>${p.name}</td>
        <td style="text-align:center">${item.unit}</td>
        <td style="text-align:right">LKR ${item.price.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
        <td style="text-align:center"><button class="remove-btn" onclick="removeItem('${code}')">×</button></td>
      </tr>`;
    }).join('');

  const customRows = customCodes
    .filter(code => customItems[code].price !== null && customItems[code].price !== undefined)
    .map(code=>{
      const item = customItems[code];
      return `<tr style="background:#fffdf5">
        <td style="font-size:11px;font-weight:700;color:#888">${code}</td>
        <td>${item.name}</td>
        <td style="text-align:center">${item.unit}</td>
        <td style="text-align:right">LKR ${item.price.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
        <td style="text-align:center"><button class="remove-btn" onclick="removeCustomItem('${code}')">×</button></td>
      </tr>`;
    }).join('');

  const pendingHtml = '';

  const hasItems = productRows || customRows;
  document.getElementById('quote-body').innerHTML = hasItems ? `<table>
    <thead><tr>
      <th style="width:70px">Code</th>
      <th>Product / Item</th>
      <th style="width:70px;text-align:center">Unit</th>
      <th style="width:130px;text-align:right">Unit Price (LKR)</th>
      <th style="width:36px"></th>
    </tr></thead>
    <tbody>${productRows}${customRows}</tbody>
  </table>${pendingHtml}` : `<div class="empty-msg">Select products and enter Unit Price to add them here</div>`;
}

async function submitQuote(){
  const name=document.getElementById('cust-name').value.trim();
  const date=document.getElementById('quote-date').value;
  const status=document.getElementById('status-msg');
  if(!name){status.className='status error';status.textContent='⚠ Please enter the customer / company name.';return;}
  if(!date){status.className='status error';status.textContent='⚠ Please select a date.';return;}
  if(!Object.keys(cart).length && !Object.keys(customItems).length){status.className='status error';status.textContent='⚠ Please select at least one product.';return;}

  // Check for items without price
  const noPrice = [
    ...Object.keys(cart).filter(code=>cart[code].price===null||cart[code].price===undefined),
    ...Object.keys(customItems).filter(code=>customItems[code].price===null||customItems[code].price===undefined)
  ];
  if(noPrice.length){
    const names = noPrice.map(code=>{
      if(cart[code]){const p=PRODUCTS.find(x=>x.code===code);return p?p.name:code;}
      return customItems[code]?customItems[code].name:code;
    });
    status.className='status error';
    status.textContent='⚠ Please enter Unit Price for: ' + names.join(', ');
    return;
  }

  const btn=document.getElementById('submit-btn');
  const btnOriginalText=btn.innerHTML;
  btn.disabled=true;btn.textContent='Submitting...';status.style.display='none';

  const productItemsList = Object.keys(cart).map(code=>{
    const p=PRODUCTS.find(x=>x.code===code);
    const item=cart[code];
    return {code:p.code,name:p.name,category:p.cat,color:p.color,size:p.size,material:p.material,
      unit:item.unit,unitPrice:item.price!=null?item.price:''};
  });
  const customItemsList = Object.keys(customItems).map(code=>{
    const item=customItems[code];
    return {code:code,name:item.name,category:'Custom',color:item.color||'—',size:item.size||'—',material:'—',
      unit:item.unit,unitPrice:item.price!=null?item.price:''};
  });
  const items = [...productItemsList, ...customItemsList].map((item,i)=>({...item,itemNo:i+1}));

  const payload={
    quoteNo:currentQNo,
    date,
    customerName:name,
    customerEmail:document.getElementById('cust-email').value,
    note:document.getElementById('note').value,
    items,
    submittedAt:new Date().toISOString()
  };

  try{
    await fetch(WEBHOOK_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    status.className='status success';
    status.textContent='✓ Quotation '+currentQNo+' successfully submitted to Google Sheets!';
    saveCustomerToHistory(name, document.getElementById('cust-email').value.trim());
    currentQNo=genQNo();
    document.getElementById('qno-display').textContent=currentQNo;
    cart={};
    document.getElementById('cust-name').value='';
    document.getElementById('cust-email').value='';
    document.getElementById('note').value='';
    renderProducts();renderQuote();
  }catch(e){
    status.className='status error';
    status.textContent='⚠ Submission failed: '+e.message;
  }
  btn.disabled=false;btn.innerHTML=btnOriginalText;

// ── CUSTOMER AUTOCOMPLETE ──
function saveCustomerToHistory(name, email){
  if(!name) return;
  let history = JSON.parse(localStorage.getItem('dm_customers')||'[]');
  // Remove duplicate
  history = history.filter(c => c.name.toLowerCase() !== name.toLowerCase());
  // Add to front
  history.unshift({name, email: email||''});
  // Keep max 50
  if(history.length > 50) history = history.slice(0,50);
  localStorage.setItem('dm_customers', JSON.stringify(history));
}

function onNameInput(val){
  const box = document.getElementById('name-suggest');
  if(!val || val.length < 1){ box.style.display='none'; return; }
  let history = JSON.parse(localStorage.getItem('dm_customers')||'[]');
  const matches = history.filter(c => c.name.toLowerCase().includes(val.toLowerCase()));
  if(!matches.length){ box.style.display='none'; return; }
  box.innerHTML = matches.slice(0,8).map(c=>`
    <div class="suggest-item" onmousedown="selectCustomer('${c.name.replace(/'/g,"\'")}','${(c.email||'').replace(/'/g,"\'")}')">
      <span class="suggest-name">${c.name}</span>
      <span class="suggest-email">${c.email||''}</span>
    </div>`).join('');
  box.style.display='block';
}

function selectCustomer(name, email){
  document.getElementById('cust-name').value = name;
  if(email) document.getElementById('cust-email').value = email;
  closeSuggest();
}

function closeSuggest(){
  document.getElementById('name-suggest').style.display='none';
}

initTabs();renderProducts();

async function submitAndPrint(){
  const name=document.getElementById('cust-name').value.trim();
  const date=document.getElementById('quote-date').value;
  const status=document.getElementById('status-msg');
  if(!name){status.className='status error';status.textContent='⚠ Please enter the customer / company name.';status.style.display='block';return;}
  if(!date){status.className='status error';status.textContent='⚠ Please select a date.';status.style.display='block';return;}
  if(!Object.keys(cart).length){status.className='status error';status.textContent='⚠ Please select at least one product.';status.style.display='block';return;}

  // Open the print/PDF window first, while the cart and customer fields still hold the current data
  printQuotation();
  // Then submit the same data to Google Sheets (this also clears the form on success)
  await submitQuote();
}

  </div>
  <script>
    window.onload=function(){
      var imgs=document.images,total=imgs.length,loaded=0,done=false;
      function tryPrint(){
        if(done)return;done=true;
        document.getElementById('print-tip').style.display='none';
        window.print();
      }
      if(total===0){tryPrint();return;}
      for(var i=0;i<total;i++){
        if(imgs[i].complete){loaded++;}
        else{
          imgs[i].addEventListener('load',function(){loaded++;if(loaded>=total)tryPrint();});
          imgs[i].addEventListener('error',function(){loaded++;if(loaded>=total)tryPrint();});
        }
      }
      if(loaded>=total)tryPrint();
      else setTimeout(tryPrint,1500);
    };
